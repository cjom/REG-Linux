name: Build REG-Linux for CHA

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  FORCE_UNSAFE_CONFIGURE: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REG_TOKEN: ${{ secrets.REG_TOKEN }}
  SCREENSCRAPER_DEV_LOGIN: ${{ secrets.SCREENSCRAPER_DEV_LOGIN }}
  GAMESDB_APIKEY: ${{ secrets.GAMESDB_APIKEY }}
  CHEEVOS_DEV_LOGIN: ${{ secrets.CHEEVOS_DEV_LOGIN }}
  HFS_DEV_LOGIN: ${{ secrets.HFS_DEV_LOGIN }}

jobs:
  build:
    name: Build REG-Linux for CHA
    runs-on: ubuntu-latest
    steps:
      - name: apps install
        id: apps_install
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes build-essential git zip default-jre autoconf automake mtools u-boot-tools flex wget cpio dosfstools libtool gcc-multilib g++-multilib python3-pip curl
      - name: compile
        id: compile_step
        shell: bash
        run: |
          cd ..
          rm -rf ./REG-Linux
          git clone --branch REG-Linux-CHA "https://${GITHUB_REPOSITORY_OWNER}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ./REG-Linux
          cd REG-Linux
          git submodule init
          git submodule update
          sed -i 's|define DOWNLOAD|define DOWNLOAD\
            echo \"BUILD_DIR=\$(BUILD_DIR)\"\
            echo \"DL_DIR=\$(DL_DIR)\"\
            rm -rf \$(BUILD_DIR)\
            rm rf \$(DL_DIR)\
            mkdir -p \$(BUILD_DIR)\
            mkdir -p \$(DL_DIR)\
            |' buildroot/package/pkg-download.mk
          make O=$PWD/output/cha BR2_EXTERNAL=$PWD -C $PWD/buildroot reglinux-cha_defconfig
          cd output/cha
          make
          # Debug
          echo "Looking for *.img.gz"
          find "${GITHUB_WORKSPACE}"/ -type f -iname *.img.gz -print
      - name: upload_artifacts
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reglinux-cha
          path: ./*.img.gz
