name: Build REG-Linux for CHA

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  FORCE_UNSAFE_CONFIGURE: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REG_TOKEN: ${{ secrets.REG_TOKEN }}
  SCREENSCRAPER_DEV_LOGIN: ${{ secrets.SCREENSCRAPER_DEV_LOGIN }}
  GAMESDB_APIKEY: ${{ secrets.GAMESDB_APIKEY }}
  CHEEVOS_DEV_LOGIN: ${{ secrets.CHEEVOS_DEV_LOGIN }}
  HFS_DEV_LOGIN: ${{ secrets.HFS_DEV_LOGIN }}

jobs:
  build:
    name: Build REG-Linux for CHA
    runs-on: ubuntu-latest
    container: reglinux/reglinux-build:latest
    steps:
      - name: download git
        id: download_git
        shell: bash
        run: |
          cd ..
          rm -rf ./REG-Linux
          git clone --branch REG-Linux-CHA "https://${GITHUB_REPOSITORY_OWNER}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ./REG-Linux
          cd REG-Linux
          git submodule init
          git submodule update
          rm -rf .git .github
          CUSTOM_DIR=${PWD}/custom BUILDROOT_DIR=${PWD}/buildroot bash ${PWD}/scripts/linux/mergeToBR.sh
          # After each package is compiled and installed, delete build folder
          sed -i '/stamp_installed\:/,/stamp_dircleaned\:/ s:^$:\tfind $(BUILD_DIR) -type f -not -path "*/buildroot-config/*"  -not \\( -name ".stamp*" -or -name ".br*" -or -name ".config" \\) -delete \
          	find $(BUILD_DIR) -type d -mindepth 1 -empty -delete \
          	du -h -s $(PWD) \
          	df -Ph $(PWD) \n :' buildroot/package/pkg-generic.mk
          # After each downloaded package is extracted, delete older and keep latest 3
          sed -i 's:(TAR_OPTIONS) -:(TAR_OPTIONS) - \&\& find \$\$(DL_DIR) -mindepth 1 -maxdepth 1 -type d -printf "%T\@\\t%p\\n" | sort -g | head -n -3 | cut -f 2- | xargs rm -rfv :' buildroot/package/pkg-generic.mk
      - name: compile
        id: compile_step
        shell: bash
        run: |
          # Abort before 6 hours limit to save artifacts
          ( sleep 20700; exit 1 ) </dev/null &>/dev/null &
          mv -f Makefile.github Makefile
          make cha-build
          # Debug
          echo "Looking for *.img.gz"
          find ${GITHUB_WORKSPACE}/ -type f -iname '*.img.gz' -print
      - name: upload_img
        id: upload_img
        uses: actions/upload-artifact@v4
        with:
          compression-level: 0
          overwrite: true
          name: reglinux-cha
          path: |
            reglinux-*.img.gz
            system.version
            *.md5
      - name: upload_build_part_1
        if: ${{ ! cancelled() }}
        id: upload_build_part_1
        uses: actions/upload-artifact@v4
        with:
          compression-level: 9
          overwrite: true
          include-hidden-files: true
          name: reglinux-output-cha
          path: |
            ./output/cha/
            !./output/cha/host
      - name: upload_build_part_2
        if: ${{ ! cancelled() }}
        id: upload_build_part_2
        uses: actions/upload-artifact@v4
        with:
          compression-level: 9
          overwrite: true
          include-hidden-files: true
          name: reglinux-output-cha-host
          path: ./output/cha/host
