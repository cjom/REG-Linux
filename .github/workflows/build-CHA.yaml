name: Build REG-Linux for CHA

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  FORCE_UNSAFE_CONFIGURE: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REG_TOKEN: ${{ secrets.REG_TOKEN }}
  SCREENSCRAPER_DEV_LOGIN: ${{ secrets.SCREENSCRAPER_DEV_LOGIN }}
  GAMESDB_APIKEY: ${{ secrets.GAMESDB_APIKEY }}
  CHEEVOS_DEV_LOGIN: ${{ secrets.CHEEVOS_DEV_LOGIN }}
  HFS_DEV_LOGIN: ${{ secrets.HFS_DEV_LOGIN }}

jobs:
  build:
    name: Build REG-Linux for CHA
    runs-on: ubuntu-latest
    steps:
      - name: apps install
        id: apps_install
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y -o APT::Immediate-Configure=0 build-essential cmake git libncurses6 libncurses-dev libssl-dev mercurial texinfo zip default-jre imagemagick subversion autoconf automake bison scons libglib2.0-dev bc gh mtools u-boot-tools flex wget cpio dosfstools libtool rsync device-tree-compiler gettext locales graphviz python3 python3-numpy python3-matplotlib gcc-multilib g++-multilib libgnutls28-dev
          sudo apt-get autoremove
          sudo apt-get clean
          rm -rf /var/lib/apt/lists/*
      - name: compile
        id: compile_step
        shell: bash
        run: |
          cd ..
          rm -rf ./REG-Linux
          git clone --branch REG-Linux-CHA "https://${GITHUB_REPOSITORY_OWNER}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ./REG-Linux
          cd REG-Linux
          git submodule init
          git submodule update
          sed -i 's|define DOWNLOAD|define DOWNLOAD\
            rm -rf \$(DL_DIR)\
            mkdir -p \$(DL_DIR)\
            find \$(BUILD_DIR) -type f ! -name '.stamp*' -delete\
            find \$(BUILD_DIR) -type d -empty -delete\
            mkdir -p \$(BUILD_DIR)\
            |' buildroot/package/pkg-download.mk
          bash ${PWD}/configs/createDefconfig.sh ${PWD}/configs/reglinux-cha
          mkdir -p output/cha/buildroot output/cha/build
          make O=${PWD}/output/cha BR2_EXTERNAL=${PWD} -C ${PWD}/buildroot reglinux-cha_defconfig
          cd output/cha
          make
          # Debug
          echo "Looking for *.img.gz"
          find "${GITHUB_WORKSPACE}"/output/cha -type f -iname *.img.gz -print
      - name: upload_artifacts
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reglinux-cha
          path: ./*.img.gz
