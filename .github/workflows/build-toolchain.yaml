name: Build Toolchain

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-toolchain:
    name: Compile Toolchain
    runs-on: ubuntu-latest
    outputs:
      donewcache: ${{ steps.compile_toolchain_step.donewcache }}
    strategy:
      matrix:
        arch: [aarch64, armhf, asahi, armv7, riscv64, x86_64]
        include:
          - target: h5
            arch: aarch64
          - target: bcm2835
            arch: armhf
          - target: h3
            arch: armv7
          - target: asahi
            arch: asahi
          - target: jh7110
            arch: riscv64
          - target: x86_64
            arch: x86_64
      fail-fast: false

    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 8192
          swap-size-mb: 16384
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile toolchain for ${{ matrix.arch }}
        id: compile_toolchain_step
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh extension install actions/gh-actions-cache
          cacheID="$(gh cache list --key toolchain-${{ matrix.arch }}-${{ hashFiles('custom/list.hash', '.gitmodules') }} --json id --jq '.[].id')"
          if [ -n "${cacheID}" ]
          then
            echo "Toolchain already cached with ID=${cacheID}"
            echo "donewcache='false'" >> "$GITHUB_OUTPUT"
          else
            git submodule init
            git submodule update
            
            # Patch Makefile
            sed -i '/^DOCKER_REPO / s|reglinux|ghcr.io/cjom|' Makefile
            sed -i '/ build . -t /d' Makefile
            sed -i 's/\$(MAKE_JLEVEL)/4/' Makefile
            sed -i 's/\$(MAKE_LLEVEL)/4/' Makefile
            
            # Disable CCACHE
            sed -i '/BR2_CCACHE/d' configs/reglinux-board.common
            
            # After each package is installed, delete downloaded files
            sed -i '/stamp_installed\:/,/stamp_dircleaned\:/ s:^$:\trm -rfv "\$(\$(PKG)_DL_DIR)"\n\tdf -h\n\tfree -h\n:' buildroot/package/pkg-generic.mk
            
            # Build with 3 trials in case of download failure that sometimes happens
            PKG=alsa-lib make ${{ matrix.target }}-pkg || {
              echo "Retrying build after failure..."
              sleep 60
              PKG=alsa-lib make ${{ matrix.target }}-pkg || {
                echo "Retrying build a final time..."
                sleep 60
                PKG=alsa-lib make ${{ matrix.target }}-pkg
              }
            }            
            echo "donewcache='true'" >> "$GITHUB_OUTPUT"
            for id in $(gh cache list --key toolchain-${{ matrix.arch }} --json id --jq '.[].id'); do
              gh cache delete $id ||:
            done
          fi

      - name: Save toolchain cache
        if: ${{ steps.compile_toolchain_step.outputs.donewcache == 'true' && ! cancelled() }}
        id: save_toolchain_cache
        uses: actions/cache/save@v4
        with:
          path: ./output/${{ matrix.target }}
          key: toolchain-${{ matrix.arch }}-${{ hashFiles('custom/list.hash', '.gitmodules') }}
