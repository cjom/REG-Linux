name: Build Toolchain

on:
  workflow_call:
  workflow_dispatch:

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-toolchain:
    name: Compile Toolchain
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, armhf, asahi, mipsel, riscv64, x86_64]
        include:
          - target: h5
            arch: aarch64
          - target: bcm2835
            arch: armhf
          - target: h3
            arch: armv7
          - target: asahi
            arch: asahi
          - target: jh7110
            arch: riscv64
          - target: x86_64
            arch: x86_64
      fail-fast: false

    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 12288
          swap-size-mb: 20480
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile toolchain for ${{ matrix.arch }}
        id: compile_toolchain_step
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh extension install actions/gh-actions-cache
          if gh cache list | grep -q -m 1 "toolchain-${{ matrix.arch }}-${{ hashFiles('custom/list.hash') }}"
          then
            echo "donewcache=${{ false }}" >> "$GITHUB_OUTPUT"
          else
            git submodule init
            git submodule update
            
            # Patch Makefile
            sed -i '/^DOCKER_REPO / s|reglinux|ghcr.io/cjom|' Makefile
            sed -i '/ build . -t /d' Makefile
            
            # Disable CCACHE
            sed -i '/BR2_CCACHE/d' configs/reglinux-board.common
            
            # Build with 3 trials in case of download failure that sometimes happens
            PKG=alsa-lib make ${{ matrix.target }}-pkg || { sleep 15 && PKG=alsa-lib make ${{ matrix.target }}-pkg } || { sleep 15 && PKG=alsa-lib make ${{ matrix.target }}-pkg }
            
            echo "donewcache=${{ true }}" >> "$GITHUB_OUTPUT"
            gh cache list | grep "toolchain-${{ matrix.arch }}" | awk '{print $1}' | xargs -I {} gh cache delete {}
          fi

      - name: Save toolchain cache
        if: ${{ steps.compile_toolchain_step.donewcache == 'true' }}
        id: save_toolchain_cache
        uses: actions/cache/save@v4
        with:
          path: ./output/${{ matrix.target }}
          key: toolchain-${{ matrix.arch }}-${{ hashFiles('custom/list.hash') }}

  build-llvm-clang-libclc:
    uses: ./.github/workflows/build-llvm-clang-libclc.yaml

